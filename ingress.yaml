apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-gold-std
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-svc-gold
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-svc-std
            port:
              number: 80