apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-gold-std
spec:
  ingressClassName: nginx   # or alb (depending on your setup)
  rules:
  - http:
      paths:
      - path: /gold
        pathType: Prefix
        backend:
          service:
            name: my-svc-gold
            port:
              number: 80
      - path: /std
        pathType: Prefix
        backend:
          service:
            name: my-svc-std
            port:
              number: 80